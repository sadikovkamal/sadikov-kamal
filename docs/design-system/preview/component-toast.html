<!doctype html>
<html lang="uz">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>@import url("https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap");
body{font-family:Geist,sans-serif;font-size:13px;}
.toasts{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.toast{display:flex;align-items:center;gap:10px;background:oklch(1 0 0);border-radius:10px;box-shadow:0 8px 22px -8px oklch(0 0 0 / 0.20),0 0 0 1px oklch(0.922 0 0);padding:11px 14px;width:340px;font-size:13px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.x{margin-left:auto;color:oklch(0.556 0 0);cursor:pointer;font-size:14px;}
</style>
</head>
<body>
<div class="card">
  <div class="label">Toast · sonner-style · neutral / destructive</div>
  <div class="toasts">
    <div class="toast"><span class="dot" style="background:oklch(0.205 0 0);"></span><span>Masala saqlandi.</span><span class="x">×</span></div>
    <div class="toast"><span class="dot" style="background:oklch(0.205 0 0);"></span><span>Teglar birlashtirildi · 12 ta masala ko'chirildi.</span><span class="x">×</span></div>
    <div class="toast"><span class="dot" style="background:oklch(0.577 0.245 27);"></span><span style="color:oklch(0.577 0.245 27);">Import muvaffaqiyatsiz · 3 ta xato.</span><span class="x">×</span></div>
  </div>
</div>
</body></html>
