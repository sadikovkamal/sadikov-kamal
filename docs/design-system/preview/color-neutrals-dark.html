<!doctype html>
<html lang="uz">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<title>Neutrals — dark</title>
<style>body{background:oklch(0.145 0 0); color:oklch(0.985 0 0);} .label{color:oklch(0.708 0 0);} .hairline{box-shadow:inset 0 0 0 1px oklch(1 0 0 / 0.10);}</style>
</head>
<body>
<div class="card">
  <div class="label">Neutrals · dark</div>

    <div class="swatch" style="background:oklch(0.556 0 0); color:oklch(0.985 0 0);">

    </div>
    <div class="swatch" style="background:oklch(0.708 0 0); color:oklch(0.145 0 0);">
      <div class="name">muted-foreground</div><div class="val">0.708 / 0</div>
