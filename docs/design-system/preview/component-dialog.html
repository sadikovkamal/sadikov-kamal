<!doctype html>
<html lang="uz">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>@import url("https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap");
body{font-family:Geist,sans-serif;font-size:14px;}
.dlg-bg{background:oklch(0.145 0 0 / 0.45);padding:18px;border-radius:14px;display:flex;justify-content:center;}
.dlg{width:380px;background:oklch(1 0 0);border-radius:12px;box-shadow:0 10px 38px -10px oklch(0 0 0 / 0.35),0 10px 20px -15px oklch(0 0 0 / 0.20);overflow:hidden;}
.dlg-h{padding:16px 18px 4px;}
.dlg-t{font-weight:600;font-size:15px;}
.dlg-d{color:oklch(0.556 0 0);font-size:13px;margin-top:6px;line-height:1.5;}
.dlg-f{padding:14px 18px 16px;display:flex;justify-content:flex-end;gap:8px;}
.btn{height:30px;padding:0 12px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid transparent;cursor:pointer;font-family:Geist,sans-serif;}
.btn-out{background:oklch(1 0 0);border-color:oklch(0.922 0 0);color:oklch(0.145 0 0);}
.btn-d{background:oklch(0.577 0.245 27 / 0.10);color:oklch(0.577 0.245 27);}
</style>
</head>
<body>
<div class="card">
  <div class="label">Dialog · the only elevated surface</div>
  <div class="dlg-bg">
    <div class="dlg">
      <div class="dlg-h">
        <div class="dlg-t">3 ta masalani o'chirasizmi?</div>
        <div class="dlg-d">Bu amal qaytarib bo'lmaydi. Tanlangan masalalar va ularning mavzu/teg/sinf aloqalari o'chiriladi.</div>
      </div>
      <div class="dlg-f">
        <button class="btn btn-out">Bekor qilish</button>
        <button class="btn btn-d">O'chirish</button>
      </div>
    </div>
  </div>
</div>
</body></html>
