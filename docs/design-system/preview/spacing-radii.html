<!doctype html>
<html lang="uz">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Radii · seed --radius: 10px</div>
  <div class="row" style="gap:14px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div class="hairline" style="width:64px;height:48px;border-radius:6px;background:oklch(0.97 0 0);"></div>
      <div style="font-size:11px;">sm · 6</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div class="hairline" style="width:64px;height:48px;border-radius:8px;background:oklch(0.97 0 0);"></div>
      <div style="font-size:11px;">md · 8</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div class="hairline" style="width:64px;height:48px;border-radius:10px;background:oklch(0.97 0 0);"></div>
      <div style="font-size:11px;">lg · 10 (default)</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div class="hairline" style="width:64px;height:48px;border-radius:14px;background:oklch(0.97 0 0);"></div>
      <div style="font-size:11px;">xl · 14 (card)</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div class="hairline" style="width:64px;height:24px;border-radius:9999px;background:oklch(0.97 0 0);"></div>
      <div style="font-size:11px;">pill (badge)</div>
    </div>
  </div>
  <div style="font-size:12px; color:oklch(0.556 0 0); line-height:1.5;">
    Tailwind v4 derives all radii from <span style="font-family:'Geist Mono',monospace;">--radius: 0.625rem</span>.
    Buttons rounded-lg · inputs rounded-md · cards rounded-xl · badges pill.
  </div>
</div>
</body></html>
