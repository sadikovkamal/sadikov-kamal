<!doctype html>
<html lang="uz">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>@import url("https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap");
.badge{display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:9999px;font-family:Geist,sans-serif;font-size:12px;font-weight:500;line-height:1;}
.b-default{background:oklch(0.205 0 0);color:oklch(0.985 0 0);}
.b-secondary{background:oklch(0.97 0 0);color:oklch(0.205 0 0);}
.b-destructive{background:oklch(0.577 0.245 27 / 0.10);color:oklch(0.577 0.245 27);}
.b-outline{background:oklch(1 0 0);color:oklch(0.145 0 0);box-shadow:inset 0 0 0 1px oklch(0.922 0 0);}
.b-ghost{background:transparent;color:oklch(0.556 0 0);}
</style>
</head>
<body>
<div class="card">
  <div class="label">Badges · pill · 20px · 12/500</div>
  <div class="row">
    <span class="badge b-default">muvaffaqiyatli</span>
    <span class="badge b-secondary">Algebra</span>
    <span class="badge b-destructive">xato</span>
    <span class="badge b-outline">qisman</span>
    <span class="badge b-ghost">kutilmoqda</span>
  </div>
  <div class="label">In context · topic tags + difficulty</div>
  <div class="row">
    <span class="badge b-secondary">Algebra</span>
    <span class="badge b-secondary">Tenglamalar</span>
    <span class="badge b-secondary">Kvadrat</span>
    <span style="font-size:12px;color:oklch(0.556 0 0);font-family:Geist,sans-serif;">+2</span>
    <span style="margin-left:auto;font-size:12px;color:oklch(0.145 0 0);font-family:Geist,sans-serif;font-weight:500;">3 / 5</span>
  </div>
</div>
</body></html>
