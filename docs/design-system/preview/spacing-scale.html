<!doctype html>
<html lang="uz">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="label">Spacing · 4px base · Tailwind defaults</div>
  <div style="display:flex; flex-direction:column; gap:6px; font-size:12px; font-family:'Geist Mono',monospace; color:oklch(0.145 0 0);">
    <div style="display:flex; align-items:center; gap:10px;"><span style="width:54px; color:oklch(0.556 0 0);">space-1</span><span style="display:inline-block; width:4px; height:14px; background:oklch(0.205 0 0); border-radius:2px;"></span><span style="color:oklch(0.556 0 0);">4 · inline gap-1</span></div>
    <div style="display:flex; align-items:center; gap:10px;"><span style="width:54px; color:oklch(0.556 0 0);">space-2</span><span style="display:inline-block; width:8px; height:14px; background:oklch(0.205 0 0); border-radius:2px;"></span><span style="color:oklch(0.556 0 0);">8 · button gap</span></div>
    <div style="display:flex; align-items:center; gap:10px;"><span style="width:54px; color:oklch(0.556 0 0);">space-3</span><span style="display:inline-block; width:12px; height:14px; background:oklch(0.205 0 0); border-radius:2px;"></span><span style="color:oklch(0.556 0 0);">12 · card grid gap</span></div>
    <div style="display:flex; align-items:center; gap:10px;"><span style="width:54px; color:oklch(0.556 0 0);">space-4</span><span style="display:inline-block; width:16px; height:14px; background:oklch(0.205 0 0); border-radius:2px;"></span><span style="color:oklch(0.556 0 0);">16 · card padding</span></div>
    <div style="display:flex; align-items:center; gap:10px;"><span style="width:54px; color:oklch(0.556 0 0);">space-6</span><span style="display:inline-block; width:24px; height:14px; background:oklch(0.205 0 0); border-radius:2px;"></span><span style="color:oklch(0.556 0 0);">24 · page padding</span></div>
    <div style="display:flex; align-items:center; gap:10px;"><span style="width:54px; color:oklch(0.556 0 0);">space-8</span><span style="display:inline-block; width:32px; height:14px; background:oklch(0.205 0 0); border-radius:2px;"></span><span style="color:oklch(0.556 0 0);">32 · section break</span></div>
  </div>
</div>
</body></html>
