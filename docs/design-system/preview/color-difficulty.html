<!doctype html>
<html lang="uz">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<title>Difficulty scale 1–5</title></head>
<body>
<div class="card">
  <div class="label">Qiyinlik · 1 → 5 · neutral ramp (light → dark = easy → hard)</div>
  <div class="row">
    <div class="swatch" style="background:oklch(0.87 0 0); color:oklch(0.145 0 0); min-height:72px;">
      <div class="name">1 — oson</div><div class="val">0.87 / 0</div>
    </div>
    <div class="swatch" style="background:oklch(0.70 0 0); color:oklch(0.145 0 0); min-height:72px;">
      <div class="name">2</div><div class="val">0.70 / 0</div>
    </div>
    <div class="swatch" style="background:oklch(0.55 0 0); color:oklch(0.985 0 0); min-height:72px;">
      <div class="name">3 — o'rtacha</div><div class="val">0.55 / 0</div>
    </div>
    <div class="swatch" style="background:oklch(0.38 0 0); color:oklch(0.985 0 0); min-height:72px;">
      <div class="name">4</div><div class="val">0.38 / 0</div>
    </div>
    <div class="swatch" style="background:oklch(0.20 0 0); color:oklch(0.985 0 0); min-height:72px;">
      <div class="name">5 — qiyin</div><div class="val">0.20 / 0</div>
    </div>
  </div>
  <div class="row" style="gap:6px;">
    <div class="label" style="margin-right:8px;">In use:</div>
    <span style="display:inline-flex; height:28px; padding:0 10px; align-items:center; background:oklch(0.205 0 0); color:oklch(0.985 0 0); border-radius:6px; font-size:12px; font-weight:500;">3 / 5</span>
    <span style="display:inline-flex; gap:2px;">
      <span style="width:14px;height:14px;background:oklch(0.205 0 0);border-radius:3px;"></span>
      <span style="width:14px;height:14px;background:oklch(0.205 0 0);border-radius:3px;"></span>
      <span style="width:14px;height:14px;background:oklch(0.205 0 0);border-radius:3px;"></span>
      <span style="width:14px;height:14px;background:oklch(0.922 0 0);border-radius:3px;"></span>
      <span style="width:14px;height:14px;background:oklch(0.922 0 0);border-radius:3px;"></span>
    </span>
  </div>
</div>
</body></html>
