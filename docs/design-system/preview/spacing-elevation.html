<!doctype html>
<html lang="uz">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>@import url("https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap");</style>
</head>
<body>
<div class="card">
  <div class="label">Elevation · flat by design · hairline ring instead of shadow</div>
  <div class="row" style="gap:16px;">
    <div style="flex:1; min-height:80px; background:oklch(1 0 0); border-radius:14px; box-shadow:inset 0 0 0 1px oklch(0.145 0 0 / 0.10); padding:14px; display:flex; flex-direction:column; gap:4px;">
      <div style="font-family:Geist,sans-serif; font-size:14px; font-weight:600;">Card</div>
      <div style="font-family:Geist,sans-serif; font-size:12px; color:oklch(0.556 0 0);">ring-1 ring-foreground/10</div>
    </div>
    <div style="flex:1; min-height:80px; background:oklch(0.97 0 0); border-radius:10px; padding:14px; display:flex; flex-direction:column; gap:4px;">
      <div style="font-family:Geist,sans-serif; font-size:14px; font-weight:600;">Muted block</div>
      <div style="font-family:Geist,sans-serif; font-size:12px; color:oklch(0.556 0 0);">bg-muted · no border</div>
    </div>
    <div style="flex:1; min-height:80px; background:oklch(1 0 0); border-radius:10px; box-shadow:0 10px 38px -10px oklch(0 0 0 / 0.35), 0 10px 20px -15px oklch(0 0 0 / 0.20); padding:14px; display:flex; flex-direction:column; gap:4px;">
      <div style="font-family:Geist,sans-serif; font-size:14px; font-weight:600;">Dialog</div>
      <div style="font-family:Geist,sans-serif; font-size:12px; color:oklch(0.556 0 0);">only elevated surface</div>
    </div>
  </div>
  <div style="font-size:12px; color:oklch(0.556 0 0); font-family:Geist,sans-serif;">
    Cards never lift on hover. The only motion is buttons' 1px translate-y on active.
  </div>
</div>
</body></html>
