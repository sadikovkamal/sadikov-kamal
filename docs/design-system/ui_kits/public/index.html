<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<title>Provia — public</title>
<link rel="stylesheet" href="../_shared.css">
<style>
  body{display:flex;flex-direction:column;min-height:100vh}
  .top{border-bottom:1px solid var(--border);background:var(--bg)}
  .top-inner{max-width:1152px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px;font:600 18px/1 "Geist",sans-serif;letter-spacing:-0.01em;color:var(--fg);text-decoration:none}
  .brand img{width:30px;height:30px;border-radius:8px}
  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px}
  .hero{max-width:560px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px}
  .hero h1{font:700 56px/1.05 "Geist",sans-serif;letter-spacing:-0.025em;margin:0;color:var(--fg)}
  .hero .tagline{font-size:18px;color:var(--muted-fg);max-width:440px;line-height:1.55}
  .badge-soon{display:inline-flex;align-items:center;gap:8px;background:var(--muted);color:var(--muted-fg);padding:6px 14px;border-radius:9999px;font:500 12.5px/1 "Geist",sans-serif;letter-spacing:0.01em}
  .badge-soon .dot{width:6px;height:6px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 4px oklch(0.520 0.180 264 / 0.18);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .preview{margin-top:14px;display:flex;align-items:center;gap:10px;color:var(--muted-fg);font-size:13.5px}
  .preview .formula{font-family:KaTeX_Main,serif;font-style:italic;color:var(--fg);font-size:16px}
  .foot{border-top:1px solid var(--border);padding:18px 24px;display:flex;justify-content:space-between;max-width:1152px;margin:0 auto;width:100%;font-size:12.5px;color:var(--muted-fg)}
  .foot .right{display:flex;gap:18px}
  .login-link{font-size:14px;color:var(--fg);text-decoration:none;font-weight:500}
  .login-link:hover{color:var(--brand)}
</style>
</head>
<body data-screen-label="01 Landing">
  <header class="top">
    <div class="top-inner">
      <a href="#" class="brand"><img src="../../assets/logo-mark.svg" alt=""><span>Provia</span></a>
      <a href="login.html" class="login-link">Kirish →</a>
    </div>
  </header>
  <main class="main">
    <div class="hero">
      <span class="badge-soon"><span class="dot"></span>Tez orada · public beta</span>
      <h1>Isbotga yo'l.</h1>
      <p class="tagline">O'zbekiston uchun matematika olimpiada masalalarining onlayn ma'lumotlar bazasi. Hozircha admin panel — talabalar uchun ochiq versiya yo'lda.</p>
      <div class="preview">
        <span>Misol:</span>
        <span class="formula">a² + b² = c²</span>
        <span class="muted mono" style="font-size:12px">· KaTeX bilan render qilinadi</span>
      </div>
    </div>
  </main>
  <footer class="foot">
    <span>© 2026 Provia</span>
    <div class="right">
      <span class="mono">v0.1.0</span>
      <a href="#" style="text-decoration:none">aloqa</a>
    </div>
  </footer>
</body>
</html>
