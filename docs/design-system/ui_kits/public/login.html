<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<title>Provia — kirish</title>
<link rel="stylesheet" href="../_shared.css">
<style>
  body{display:flex;flex-direction:column;min-height:100vh}
  .top{border-bottom:1px solid var(--border);background:var(--bg)}
  .top-inner{max-width:1152px;margin:0 auto;padding:16px 24px;display:flex;align-items:center}
  .brand{display:flex;align-items:center;gap:10px;font:600 18px/1 "Geist",sans-serif;letter-spacing:-0.01em;color:var(--fg);text-decoration:none}
  .brand img{width:30px;height:30px;border-radius:8px}
  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px}
  .login{width:380px;display:flex;flex-direction:column;gap:18px}
  .login h1{margin:0;font:700 22px/1.2 "Geist",sans-serif;letter-spacing:-0.01em}
  .login .sub{margin:-12px 0 0;color:var(--muted-fg);font-size:13px}
  .card-pad{padding:22px}
  .field{display:flex;flex-direction:column}
  .form{display:flex;flex-direction:column;gap:14px}
  .between{display:flex;align-items:center;justify-content:space-between}
  .between a{font-size:13px;color:var(--brand);text-decoration:none}
  .between a:hover{text-decoration:underline;text-underline-offset:3px}
  .err-banner{background:oklch(0.577 0.245 27 / 0.08);color:var(--destructive);padding:10px 12px;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:8px}
  .err-banner svg{width:14px;height:14px;flex-shrink:0}
  .foot{padding:16px 24px;text-align:center;font-size:12px;color:var(--muted-fg)}
  .legend{font-size:11.5px;color:var(--muted-fg);text-align:center;margin-top:4px;font-family:"Geist Mono",monospace}
</style>
</head>
<body data-screen-label="02 Login">
  <header class="top">
    <div class="top-inner">
      <a href="index.html" class="brand"><img src="../../assets/logo-mark.svg" alt=""><span>Provia</span></a>
    </div>
  </header>
  <main class="main">
    <div class="login">
      <div style="text-align:center">
        <h1>Adminlar uchun kirish</h1>
        <p class="sub">Faqat tasdiqlangan akkauntlar uchun.</p>
      </div>
      <div class="card card-pad">
        <form class="form" onsubmit="event.preventDefault();showError(this)">
          <div class="err-banner" id="err" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>Email yoki parol noto'g'ri. <span class="mono" style="font-size:12px">4 / 5 urinish</span></span>
          </div>
          <div class="field">
            <label class="label" for="e">Email</label>
            <input id="e" class="input" type="email" value="admin@provia.uz" autocomplete="email">
          </div>
          <div class="field">
            <label class="label" for="p">Parol</label>
            <input id="p" class="input" type="password" value="••••••••••" autocomplete="current-password">
          </div>
          <div class="between">
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
              <span class="cb on"><svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 8 7 12 13 4"/></svg></span>
              Eslab qolish
            </label>
            <a href="#">Yordam</a>
          </div>
          <button class="btn btn-default" type="submit" style="width:100%;height:38px">Kirish</button>
        </form>
      </div>
      <div class="legend">5 ta xato urinish = 15 daqiqa blok</div>
    </div>
  </main>
  <footer class="foot">© 2026 Provia · <span class="mono">isbotga yo'l</span></footer>
  <script>
    function showError(form){
      document.getElementById('err').style.display='flex';
      const p=form.querySelector('#p');
      p.classList.add('invalid');
      p.focus();
    }
  </script>
</body>
</html>
