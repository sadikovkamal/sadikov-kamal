name: Daily DB Backup

on:
  schedule:
    # 02:00 UTC — pick a low-traffic time so the backup window doesn't
    # overlap with admins editing problems.
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install Postgres 17 client
        run: |
          set -euo pipefail
          # Pull pg_dump 17 from the PostgreSQL apt repo. Neon runs Postgres
          # 17, so we need a matching client — Ubuntu 24.04's default ships
          # client 16, which pg_dump refuses to use against a 17 server.
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsS https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # Ubuntu's pg_wrapper at /usr/bin/pg_dump picks the lowest-versioned
          # installed client by default (16 here), so prepend the 17 bin dir
          # to PATH and persist it for later steps.
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Install AWS CLI v2
        run: |
          set -euo pipefail
          # Ubuntu 24.04 dropped the `awscli` apt package. Use Amazon's
          # official v2 installer — it's the supported path on noble.
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update
          aws --version

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          # --no-owner / --no-privileges keep the dump portable across
          # Postgres role layouts (Neon roles differ from local Docker).
          pg_dump --no-owner --no-privileges "$DATABASE_URL" \
            | gzip -9 > "backup-$DATE.sql.gz"
          ls -lh "backup-$DATE.sql.gz"
          echo "DUMP_FILE=backup-$DATE.sql.gz" >> "$GITHUB_ENV"
          echo "DUMP_DATE=$DATE" >> "$GITHUB_ENV"

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail
          aws s3 cp "$DUMP_FILE" \
            "s3://$R2_BUCKET_NAME/backups/$DUMP_FILE" \
            --endpoint-url "https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          echo "Uploaded backups/$DUMP_FILE"

      - name: Prune old backups (>30 days)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail
          ENDPOINT="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          CUTOFF_EPOCH=$(date -u -d '30 days ago' +%s)
          aws s3api list-objects-v2 \
            --bucket "$R2_BUCKET_NAME" \
            --prefix "backups/" \
            --endpoint-url "$ENDPOINT" \
            --query 'Contents[].[Key,LastModified]' \
            --output text 2>/dev/null \
          | while read -r KEY LAST_MODIFIED; do
              [ -z "$KEY" ] && continue
              OBJ_EPOCH=$(date -u -d "$LAST_MODIFIED" +%s)
              if [ "$OBJ_EPOCH" -lt "$CUTOFF_EPOCH" ]; then
                echo "Pruning $KEY"
                aws s3 rm "s3://$R2_BUCKET_NAME/$KEY" --endpoint-url "$ENDPOINT"
              fi
            done
