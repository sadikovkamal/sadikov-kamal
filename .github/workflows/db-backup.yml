name: Daily DB Backup

on:
  schedule:
    # 02:00 UTC — pick a low-traffic time so the backup window doesn't
    # overlap with admins editing problems.
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install Postgres client + AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client awscli

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          # --no-owner / --no-privileges keep the dump portable across
          # Postgres role layouts (Neon roles differ from local Docker).
          pg_dump --no-owner --no-privileges "$DATABASE_URL" \
            | gzip -9 > "backup-$DATE.sql.gz"
          ls -lh "backup-$DATE.sql.gz"
          echo "DUMP_FILE=backup-$DATE.sql.gz" >> "$GITHUB_ENV"
          echo "DUMP_DATE=$DATE" >> "$GITHUB_ENV"

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail
          aws s3 cp "$DUMP_FILE" \
            "s3://$R2_BUCKET_NAME/backups/$DUMP_FILE" \
            --endpoint-url "https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          echo "Uploaded backups/$DUMP_FILE"

      - name: Prune old backups (>30 days)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail
          ENDPOINT="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          CUTOFF_EPOCH=$(date -u -d '30 days ago' +%s)
          aws s3api list-objects-v2 \
            --bucket "$R2_BUCKET_NAME" \
            --prefix "backups/" \
            --endpoint-url "$ENDPOINT" \
            --query 'Contents[].[Key,LastModified]' \
            --output text 2>/dev/null \
          | while read -r KEY LAST_MODIFIED; do
              [ -z "$KEY" ] && continue
              OBJ_EPOCH=$(date -u -d "$LAST_MODIFIED" +%s)
              if [ "$OBJ_EPOCH" -lt "$CUTOFF_EPOCH" ]; then
                echo "Pruning $KEY"
                aws s3 rm "s3://$R2_BUCKET_NAME/$KEY" --endpoint-url "$ENDPOINT"
              fi
            done
